<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-labelledby="t d">
  <title id="t">Lone Starfish Banner</title>
  <desc id="d">A close-up photo-style illustration of a starfish on sand used as a banner.</desc>
  <rect width="1200" height="400" fill="#aad4cf"/>
  <g transform="translate(0,0)">
    <rect width="1200" height="400" fill="url(#g)"/>
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#cfeee9"/>
        <stop offset="100%" stop-color="#b3e3dd"/>
      </linearGradient>
    </defs>
  </g>
  <!-- starfish shape, kept simple and clean so it reads well at banner sizes -->
  <g transform="translate(480,60)">
    <path d="M120 60 C110 20 60 10 40 40 C10 80 30 120 30 160 C10 200 60 240 100 220 C140 200 160 160 200 140 C240 120 220 80 200 60 C180 40 140 40 120 60 Z" fill="#c57b4a" stroke="#8a5836" stroke-width="6"/>
  </g>
</svg>
