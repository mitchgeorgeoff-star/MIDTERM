    <rect x="98" y="175" width="18" height="14" rx="2"/>
    <rect x="126" y="175" width="18" height="14" rx="2"/>
    <rect x="240" y="145" width="18" height="14" rx="2"/>
    <rect x="268" y="145" width="18" height="14" rx="2"/>
    <rect x="296" y="145" width="18" height="14" rx="2"/>
